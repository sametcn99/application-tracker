name: tests

on:
  push:
    branches: [main, master]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DATABASE_URL: postgresql://appuser:apppassword@localhost:5432/appdb?schema=public
  AUTH_SECRET: ci-secret-please-change-please-change-please-change
  AUTH_TRUST_HOST: "true"
  ADMIN_EMAIL: admin@example.com
  ADMIN_PASSWORD: change-me
  ADMIN_NAME: Admin
  UPLOAD_MAX_BYTES: "10485760"
  MINIO_ROOT_USER: minioadmin
  MINIO_ROOT_PASSWORD: minioadmin
  S3_ENDPOINT: http://localhost:9000
  S3_REGION: us-east-1
  S3_BUCKET: attachments
  S3_FORCE_PATH_STYLE: "true"

jobs:
  unit:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Validate messages
        run: bun run i18n:check
      - name: Generate Prisma client
        run: bunx prisma generate
      - name: Run vitest
        run: bun run test
      - name: Coverage
        run: bun run test:coverage
        continue-on-error: true
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/
          if-no-files-found: ignore

  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    needs: unit
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: appuser
          POSTGRES_PASSWORD: apppassword
          POSTGRES_DB: appdb
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U appuser -d appdb"
          --health-interval 5s --health-timeout 5s --health-retries 10
    env:
      E2E_ADMIN_EMAIL: admin@example.com
      E2E_ADMIN_PASSWORD: change-me
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Start MinIO
        run: |
          docker network create minio-net || true
          docker run -d --name minio --network minio-net -p 9000:9000 \
            -e MINIO_ROOT_USER="$MINIO_ROOT_USER" \
            -e MINIO_ROOT_PASSWORD="$MINIO_ROOT_PASSWORD" \
            minio/minio:latest server /data
          # Wait for minio to start
          sleep 5
          docker run --rm --network minio-net minio/mc:latest alias set myminio http://minio:9000 "$MINIO_ROOT_USER" "$MINIO_ROOT_PASSWORD"
          docker run --rm --network minio-net minio/mc:latest mb myminio/attachments || true
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Apply Prisma migrations
        run: bunx prisma migrate deploy
      - name: Generate Prisma client
        run: bunx prisma generate
      - name: Seed database
        run: bun run db:seed
      - name: Build app
        run: bun run build
      - name: Install Playwright browsers
        run: bunx playwright install --with-deps chromium
      - name: Run E2E tests
        run: bun run test:e2e
      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          if-no-files-found: ignore
